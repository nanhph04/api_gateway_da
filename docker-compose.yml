name: media-system

version: '3.8'

services:
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: api-gateway:latest
    container_name: api-gateway
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
      FRONTEND_URL: http://localhost:3000
      BACKEND_URL: http://localhost:4000
      IDENTITY_SERVICE_URL: http://identity-service:4001
      MEDIA_SERVICE_URL: http://media-service:4002
      FINANCE_SERVICE_URL: http://finance-service:4004
    ports:
      - "4000:4000"
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    external: true
    name: app-network
